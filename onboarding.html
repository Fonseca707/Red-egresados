<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinapsis | Bienvenida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d',950:'#052e16' },
                    stone: { 50:'#fafaf9',100:'#f5f5f4',200:'#e7e5e4',300:'#d6d3d1',400:'#a8a29e',500:'#78716c',600:'#57534e',700:'#44403c',800:'#292524',900:'#1c1917' },
                    sun: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',400:'#fbbf24',500:'#f59e0b',600:'#d97706' }
                },
                animation: { 'fade-in':'fadeIn 0.3s ease-out','slide-up':'slideUp 0.4s ease-out','slide-in-right':'slideInRight 0.4s cubic-bezier(0.16,1,0.3,1)' },
                keyframes: { fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},slideUp:{'0%':{transform:'translateY(20px)',opacity:'0'},'100%':{transform:'translateY(0)',opacity:'1'}},slideInRight:{'0%':{transform:'translateX(100%)'},'100%':{transform:'translateX(0)'}} }
            }}
        }
    </script>
    <style>
        body { background-color: #fafaf9; }
        .glass-nav { background: rgba(250,250,249,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(231,229,228,0.6); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .input-label { font-size:0.75rem; font-weight:700; color:#78716c; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; display:block; }
        .input-field { width:100%; padding:0.85rem 1rem; background:rgba(250,250,249,0.9); border:1px solid #e7e5e4; border-radius:0.75rem; outline:none; transition:all 0.2s ease; font-size:0.9rem; font-weight:500; color:#292524; }
        .input-field:focus { border-color:#16a34a; box-shadow:0 0 0 4px rgb(34 197 94/0.15); background:#fff; }
        .step-dot { width:2.25rem; height:2.25rem; border-radius:9999px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.85rem; transition:all 0.25s ease; }
        .step-dot.pending { background:#f5f5f4; color:#a8a29e; border:1px solid #e7e5e4; }
        .step-dot.active { background:#16a34a; color:#fff; box-shadow:0 6px 18px rgb(34 197 94/0.35); }
        .step-dot.done { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
        .traj-row { background:#fafaf9; border:1px solid #e7e5e4; border-radius:1rem; padding:1rem; }
    </style>
</head>
<body class="text-stone-800 font-sans min-h-screen flex flex-col">

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="bg-white p-5 sm:p-8 md:p-12 rounded-[2.5rem] shadow-[0_20px_50px_rgb(0,0,0,0.08)] border border-gray-100 w-full max-w-3xl relative overflow-hidden animate-fade-in">
            <div class="absolute -top-10 -right-10 w-56 h-56 bg-brand-50 rounded-full blur-2xl -z-10 opacity-70"></div>

            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-brand-50 text-brand-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 border border-brand-100 shadow-sm">
                    <i class="ph-duotone ph-hand-waving"></i>
                </div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-900">¡Bienvenido a la comunidad!</h1>
                <p class="text-gray-500 text-sm mt-2 max-w-lg mx-auto">Tu historia guía a los que vienen detrás. Cuéntanosla en 3 pasos cortos.</p>
            </div>

            <!-- Indicador de pasos -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <div class="flex flex-col items-center gap-1">
                    <div id="dot-1" class="step-dot active">1</div>
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wide">Quién eres</span>
                </div>
                <div class="w-10 h-0.5 bg-gray-200 mb-4"></div>
                <div class="flex flex-col items-center gap-1">
                    <div id="dot-2" class="step-dot pending">2</div>
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wide">Tu ruta</span>
                </div>
                <div class="w-10 h-0.5 bg-gray-200 mb-4"></div>
                <div class="flex flex-col items-center gap-1">
                    <div id="dot-3" class="step-dot pending">3</div>
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wide">Tu huella</span>
                </div>
            </div>

            <form onsubmit="onboardingLogic.next(event)">
                <!-- ===== PANEL 1: QUIÉN ERES ===== -->
                <div id="panel-1" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="input-label">Nombres *</label>
                            <input id="ob-name" type="text" placeholder="Ej: Juan Carlos" class="input-field" required minlength="2">
                        </div>
                        <div>
                            <label class="input-label">Apellidos</label>
                            <input id="ob-lastname" type="text" placeholder="Ej: Pérez" class="input-field">
                        </div>
                        <div>
                            <label class="input-label">Promoción (año de grado del colegio)</label>
                            <input id="ob-year" type="number" placeholder="Ej: 2020" min="1950" max="2100" class="input-field">
                        </div>
                        <div>
                            <label class="input-label">Ubicación actual</label>
                            <input id="ob-location" type="text" placeholder="Ej: Bogotá, Colombia" class="input-field">
                        </div>
                        <div>
                            <label class="input-label">Celular / WhatsApp</label>
                            <input id="ob-phone" type="tel" inputmode="tel" placeholder="+57 300 123 4567" class="input-field">
                        </div>
                        <div>
                            <label class="input-label">LinkedIn (URL)</label>
                            <input id="ob-linkedin" type="text" placeholder="linkedin.com/in/usuario" class="input-field">
                        </div>
                    </div>
                </div>

                <!-- ===== PANEL 2: TU RUTA (TRAYECTORIA) ===== -->
                <div id="panel-2" class="space-y-6 hidden">
                    <div>
                        <label class="input-label">Situación actual</label>
                        <select id="ob-status" class="input-field">
                            <option value="estudiando">Estudiando</option>
                            <option value="trabajando">Trabajando</option>
                            <option value="trabajando-estudiando">Trabajando y estudiando</option>
                            <option value="emprendiendo">Emprendiendo</option>
                            <option value="profesor">Profesor</option>
                        </select>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <label class="input-label mb-0">Estudios superiores</label>
                            <button type="button" onclick="onboardingLogic.addStudyRow()" class="text-xs font-bold text-brand-600 hover:text-brand-700 flex items-center gap-1"><i class="ph-bold ph-plus-circle"></i> Agregar</button>
                        </div>
                        <div id="study-rows" class="space-y-3"></div>
                        <p class="text-xs text-gray-400 mt-2">Universidad, técnico, tecnólogo, cursos largos… todo cuenta en tu ruta.</p>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <label class="input-label mb-0">Experiencia (empleos, prácticas, emprendimientos)</label>
                            <button type="button" onclick="onboardingLogic.addWorkRow()" class="text-xs font-bold text-brand-600 hover:text-brand-700 flex items-center gap-1"><i class="ph-bold ph-plus-circle"></i> Agregar</button>
                        </div>
                        <div id="work-rows" class="space-y-3"></div>
                    </div>
                    <datalist id="org-options"></datalist>
                </div>

                <!-- ===== PANEL 3: TU HUELLA ===== -->
                <div id="panel-3" class="space-y-6 hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="input-label">Área / Sector</label>
                            <input id="ob-area" type="text" placeholder="Ej: Tecnología, Salud, Finanzas" class="input-field">
                        </div>
                        <div>
                            <label class="input-label">Intereses de conexión</label>
                            <input id="ob-topics" type="text" placeholder="Ej: Mentoría, Inversiones, Proyectos" class="input-field">
                        </div>
                    </div>
                    <div>
                        <label class="input-label">Sobre ti (bio breve)</label>
                        <textarea id="ob-bio" class="input-field h-28 resize-y" placeholder="Cuéntanos sobre tu experiencia y objetivos…"></textarea>
                    </div>
                    <div>
                        <label class="input-label">Habilidades clave (separadas por comas)</label>
                        <textarea id="ob-skills" class="input-field h-20 resize-y" placeholder="Ej: Liderazgo, Python, Negociación"></textarea>
                    </div>
                    <div>
                        <label class="input-label">¿Qué expectativas / proyecciones tienes sobre ti?</label>
                        <textarea id="ob-expectations" class="input-field h-20 resize-y" placeholder="Ej: Consolidarme en liderazgo de proyectos y aportar como mentor en la red."></textarea>
                    </div>
                </div>

                <p id="ob-feedback" class="text-xs text-red-500 mt-4 text-center"></p>

                <div class="flex flex-col-reverse md:flex-row gap-4 pt-6 mt-6 border-t border-gray-100">
                    <button type="button" id="btn-back" onclick="onboardingLogic.back()" class="hidden w-full md:w-auto px-6 py-3.5 bg-gray-50 hover:bg-gray-100 text-gray-600 font-bold rounded-xl transition border border-gray-200">
                        <i class="ph-bold ph-arrow-left"></i> Atrás
                    </button>
                    <button type="submit" class="w-full md:flex-1 py-3.5 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl shadow-lg shadow-brand-500/30 transition transform hover:scale-[1.02] flex justify-center items-center gap-2" id="btn-next">
                        Siguiente <i class="ph-bold ph-arrow-right"></i>
                    </button>
                </div>
                <div class="text-center mt-4">
                    <button type="button" onclick="onboardingLogic.skip()" class="text-xs text-gray-400 hover:text-gray-600 underline">Omitir por ahora</button>
                </div>
            </form>
        </div>
    </main>

    <script src="theme.js?v=5"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
    <script src="shared.js?v=8"></script>
    <script>
        const onboardingLogic = {
            step: 1,
            _studySeq: 0,
            _workSeq: 0,

            goToStep: (n) => {
                onboardingLogic.step = n;
                [1, 2, 3].forEach(i => {
                    document.getElementById(`panel-${i}`).classList.toggle('hidden', i !== n);
                    const dot = document.getElementById(`dot-${i}`);
                    dot.className = 'step-dot ' + (i < n ? 'done' : (i === n ? 'active' : 'pending'));
                    if (i < n) dot.innerHTML = '<i class="ph-bold ph-check"></i>'; else dot.textContent = i;
                });
                document.getElementById('btn-back').classList.toggle('hidden', n === 1);
                document.getElementById('btn-next').innerHTML = n === 3
                    ? 'Plantar mi ruta <i class="ph-bold ph-plant"></i>'
                    : 'Siguiente <i class="ph-bold ph-arrow-right"></i>';
                document.getElementById('ob-feedback').textContent = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            next: async (e) => {
                e.preventDefault();
                const feedback = document.getElementById('ob-feedback');
                if (onboardingLogic.step === 1) {
                    if (!hasValidFirstName(document.getElementById('ob-name').value.trim())) {
                        feedback.textContent = 'El nombre es obligatorio y debe tener al menos 2 caracteres.'; return;
                    }
                    const phone = document.getElementById('ob-phone').value.trim();
                    if (phone && !isValidPhone(phone)) { feedback.textContent = 'El teléfono debe tener al menos 7 dígitos.'; return; }
                    const linkedin = document.getElementById('ob-linkedin').value.trim();
                    if (linkedin && !isValidLinkedInUrl(linkedin)) { feedback.textContent = 'El enlace de LinkedIn no es válido.'; return; }
                    onboardingLogic.goToStep(2);
                    if (!document.querySelector('#study-rows .traj-row')) onboardingLogic.addStudyRow();
                    return;
                }
                if (onboardingLogic.step === 2) { onboardingLogic.goToStep(3); return; }
                await onboardingLogic.save();
            },

            back: () => { if (onboardingLogic.step > 1) onboardingLogic.goToStep(onboardingLogic.step - 1); },

            addStudyRow: () => {
                const id = ++onboardingLogic._studySeq;
                document.getElementById('study-rows').insertAdjacentHTML('beforeend', `
                    <div class="traj-row" id="study-${id}">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input type="text" data-f="org" list="org-options" placeholder="Institución (Ej: U. de los Andes)" class="input-field">
                            <input type="text" data-f="titulo" placeholder="Título / Programa (Ej: Ing. Industrial)" class="input-field">
                            <div class="flex flex-wrap gap-2 items-center md:col-span-2">
                                <input type="number" data-f="inicio" placeholder="Año inicio" min="1950" max="2100" class="input-field !w-32">
                                <input type="number" data-f="fin" placeholder="Año fin" min="1950" max="2100" class="input-field !w-32">
                                <label class="flex items-center gap-2 text-xs font-bold text-gray-500 whitespace-nowrap"><input type="checkbox" data-f="actual" class="h-4 w-4 rounded border-gray-300 text-brand-600"> En curso</label>
                                <button type="button" onclick="document.getElementById('study-${id}').remove()" class="ml-auto p-2 text-gray-400 hover:text-red-500 transition" title="Quitar"><i class="ph-bold ph-trash"></i></button>
                            </div>
                        </div>
                    </div>`);
            },

            addWorkRow: () => {
                const id = ++onboardingLogic._workSeq;
                document.getElementById('work-rows').insertAdjacentHTML('beforeend', `
                    <div class="traj-row" id="work-${id}">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <input type="text" data-f="org" list="org-options" placeholder="Organización (Ej: HP)" class="input-field">
                            <input type="text" data-f="rol" placeholder="Rol / Cargo (Ej: Gerente)" class="input-field">
                            <select data-f="tipo" class="input-field">
                                <option value="empleo">Empleo</option>
                                <option value="practica">Práctica / Pasantía</option>
                                <option value="emprendimiento">Emprendimiento</option>
                            </select>
                            <div class="flex flex-wrap gap-2 items-center">
                                <input type="number" data-f="inicio" placeholder="Año inicio" min="1950" max="2100" class="input-field !w-32">
                                <label class="flex items-center gap-2 text-xs font-bold text-gray-500 whitespace-nowrap"><input type="checkbox" data-f="actual" checked class="h-4 w-4 rounded border-gray-300 text-brand-600"> Actual</label>
                                <button type="button" onclick="document.getElementById('work-${id}').remove()" class="ml-auto p-2 text-gray-400 hover:text-red-500 transition" title="Quitar"><i class="ph-bold ph-trash"></i></button>
                            </div>
                        </div>
                    </div>`);
            },

            _rowValues: (row) => {
                const v = {};
                row.querySelectorAll('[data-f]').forEach(el => {
                    v[el.dataset.f] = el.type === 'checkbox' ? el.checked : el.value.trim();
                });
                return v;
            },

            collectHitos: () => {
                const hitos = [];
                const year = document.getElementById('ob-year').value.trim();
                if (year) {
                    hitos.push({ tipo: 'colegio', organizacion: state.profile.school || DEFAULT_SCHOOL, rol: 'Bachiller', anioInicio: null, anioFin: Number(year), actual: false, descripcion: '' });
                }
                document.querySelectorAll('#study-rows .traj-row').forEach(row => {
                    const v = onboardingLogic._rowValues(row);
                    if (!v.org && !v.titulo) return;
                    hitos.push({ tipo: 'educacion', organizacion: v.org, rol: v.titulo, anioInicio: v.inicio || null, anioFin: v.fin || null, actual: v.actual, descripcion: '' });
                });
                document.querySelectorAll('#work-rows .traj-row').forEach(row => {
                    const v = onboardingLogic._rowValues(row);
                    if (!v.org && !v.rol) return;
                    hitos.push({ tipo: v.tipo || 'empleo', organizacion: v.org, rol: v.rol, anioInicio: v.inicio || null, anioFin: null, actual: v.actual, descripcion: '' });
                });
                return hitos;
            },

            save: async () => {
                if (!state.user) return;
                const btn = document.getElementById('btn-next');
                const original = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin"></i> Guardando...`;

                const hitos = onboardingLogic.collectHitos();
                const currentWork = hitos.filter(h => ['empleo', 'practica', 'emprendimiento'].includes(h.tipo) && h.actual).pop();
                const lastStudy = hitos.filter(h => h.tipo === 'educacion').pop();
                const linkedinValue = document.getElementById('ob-linkedin').value.trim();

                const payload = {
                    firstName: document.getElementById('ob-name').value.trim(),
                    lastName: document.getElementById('ob-lastname').value.trim(),
                    graduationYear: document.getElementById('ob-year').value.trim(),
                    location: document.getElementById('ob-location').value.trim(),
                    phone: document.getElementById('ob-phone').value.trim(),
                    linkedin: linkedinValue ? normalizeLinkedInUrl(linkedinValue) : '',
                    status: document.getElementById('ob-status').value,
                    area: document.getElementById('ob-area').value.trim(),
                    topics: document.getElementById('ob-topics').value.trim(),
                    bio: document.getElementById('ob-bio').value.trim(),
                    skills: document.getElementById('ob-skills').value.split(',').map(s => s.trim()).filter(Boolean),
                    expectations: document.getElementById('ob-expectations').value.trim(),
                    // Campos planos legados que el directorio sigue usando; se derivan de la ruta.
                    role: currentWork ? currentWork.rol : '',
                    studies: lastStudy ? [lastStudy.rol, lastStudy.organizacion].filter(Boolean).join(' — ') : '',
                    hitosCount: hitos.length,
                    onboardingCompleted: true,
                    school: state.profile.school || DEFAULT_SCHOOL,
                    email: state.user.email || '',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                try {
                    const docRef = alumniCollection.doc(state.user.uid);
                    const exists = (await docRef.get()).exists;
                    if (!exists) payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await docRef.set(payload, { merge: true });

                    for (const h of hitos) {
                        if (h.organizacion) {
                            h.organizacionId = await upsertOrganization(h.organizacion,
                                h.tipo === 'educacion' ? 'universidad' : (h.tipo === 'colegio' ? 'colegio' : 'empresa'));
                        }
                        await saveHito(state.user.uid, h);
                    }

                    state.profile = { ...state.profile, ...payload, skills: payload.skills.join(', ') };
                    alert('¡Tu ruta quedó plantada! Podrás seguir cultivándola desde tu perfil.');
                    goto('directory');
                } catch (error) {
                    document.getElementById('ob-feedback').textContent = 'Hubo un error al guardar: ' + (error.message || 'error desconocido');
                    btn.innerHTML = original;
                    btn.disabled = false;
                }
            },

            skip: async () => {
                if (!state.user) return;
                try {
                    await alumniCollection.doc(state.user.uid).set({
                        onboardingCompleted: true,
                        school: state.profile.school || DEFAULT_SCHOOL,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    state.profile.onboardingCompleted = true;
                    goto('directory');
                } catch (error) {
                    alert('Error al omitir: ' + (error.message || 'error desconocido'));
                }
            }
        };
        window.onboardingLogic = onboardingLogic;

        auth.onAuthStateChanged(async (user) => {
            if (!user) { goto('login'); return; }
            const ready = await hydrateAuthenticatedUser(user);
            if (!ready) return;
            if (user.displayName && !state.profile.firstName) {
                const parts = user.displayName.split(' ');
                const n = document.getElementById('ob-name');
                const l = document.getElementById('ob-lastname');
                if (n) n.value = parts[0] || '';
                if (l) l.value = parts.slice(1).join(' ') || '';
            }
            loadOrganizations().then(orgs => fillOrgDatalist('org-options', orgs));
        });
    </script>
</body>
</html>
