<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinapsis | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d',950:'#052e16' },
                    stone: { 50:'#fafaf9',100:'#f5f5f4',200:'#e7e5e4',300:'#d6d3d1',400:'#a8a29e',500:'#78716c',600:'#57534e',700:'#44403c',800:'#292524',900:'#1c1917' },
                    sun: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',400:'#fbbf24',500:'#f59e0b',600:'#d97706' }
                },
                animation: { 'fade-in':'fadeIn 0.3s ease-out','slide-up':'slideUp 0.4s ease-out','slide-in-right':'slideInRight 0.4s cubic-bezier(0.16,1,0.3,1)' },
                keyframes: { fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},slideUp:{'0%':{transform:'translateY(20px)',opacity:'0'},'100%':{transform:'translateY(0)',opacity:'1'}},slideInRight:{'0%':{transform:'translateX(100%)'},'100%':{transform:'translateX(0)'}} }
            }}
        }
    </script>
    <style>
        body { background-color: #fafaf9; }
        .glass-nav { background: rgba(250,250,249,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(231,229,228,0.6); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .section-card { background:#fff; padding:1.5rem; border-radius:2rem; border:1px solid #f5f5f4; box-shadow:0 8px 30px rgb(20 83 45/0.03); margin-bottom:1.5rem; transition:all 0.2s ease; }
        @media(min-width:768px){ .section-card{padding:2rem;} }
        .section-card:hover { box-shadow: 0 12px 40px rgb(22 163 74/0.08); }
        .input-label { font-size:0.75rem; font-weight:700; color:#78716c; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; display:block; }
        .input-field { width:100%; padding:0.85rem 1rem; background:rgba(250,250,249,0.9); border:1px solid #e7e5e4; border-radius:0.75rem; outline:none; transition:all 0.2s ease; font-size:0.9rem; font-weight:500; color:#292524; }
        .input-field:focus { border-color:#16a34a; box-shadow:0 0 0 4px rgb(34 197 94/0.15); background:#fff; }
    </style>
</head>
<body class="text-stone-800 font-sans min-h-screen flex flex-col">

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-[0_20px_50px_rgb(0,0,0,0.08)] border border-gray-100 w-full max-w-md relative overflow-hidden animate-fade-in">
            <div class="text-center mb-8">
                <div class="w-14 h-14 bg-brand-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold mx-auto mb-4 shadow-lg shadow-brand-500/30">S</div>
                <h1 class="text-2xl font-bold text-gray-900">Planta tu semilla</h1>
                <p class="text-gray-500 text-sm mt-2">Comienza tu viaje en Sinapsis</p>
            </div>

            <form onsubmit="authLogic.submitRegister(event)" class="space-y-4">
                <div>
                    <label class="input-label">Email</label>
                    <input id="register-email" type="email" required placeholder="tu.nombre@email.com" class="input-field">
                </div>
                <div>
                    <label class="input-label">Contraseña</label>
                    <input id="register-password" type="password" required minlength="6" placeholder="••••••••" class="input-field">
                </div>
                <div>
                    <label class="input-label">Confirmar contraseña</label>
                    <input id="register-password-confirm" type="password" required minlength="6" placeholder="••••••••" class="input-field">
                </div>

                <label class="flex items-start gap-3 text-sm text-gray-600">
                    <input id="register-privacy" type="checkbox" required class="mt-1 h-4 w-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                    <span>Autorizo el tratamiento de mis datos personales conforme a la <button type="button" onclick="goto('terms')" class="font-bold text-brand-600 hover:underline">Política de Tratamiento de Datos Personales y Términos</button> y declaro haberla leído y aceptado.</span>
                </label>

                <label class="flex items-start gap-3 text-sm text-gray-600">
                    <input id="register-newsletter" type="checkbox" checked class="mt-1 h-4 w-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                    <span>Deseo recibir novedades de la red de egresados (reencuentros, trabajos, etc). </span>
                </label>

                <button type="submit" class="w-full py-3.5 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl shadow-lg shadow-brand-500/30 transition">Planta tu semilla</button>
            </form>
            <button onclick="authLogic.registerWithGoogle()" class="w-full py-3.5 mt-3 bg-white text-gray-700 font-bold rounded-xl border border-gray-200 hover:bg-gray-50 transition flex items-center justify-center gap-2">
                <i class="ph ph-google-logo"></i> Registrarme con Google
            </button>
            <p id="register-feedback" class="text-xs text-gray-500 mt-3 text-center"></p>

            <div class="mt-6 text-center border-t border-gray-100 pt-4">
                <a href="login.html" class="text-sm text-brand-600 font-bold hover:underline">Ya tengo cuenta</a>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
    <script src="shared.js"></script>
    <script>
        const authLogic = {
            submitRegister: async (e) => {
                e.preventDefault();
                const email = document.getElementById('register-email').value.trim();
                const password = document.getElementById('register-password').value;
                const confirm = document.getElementById('register-password-confirm').value;
                const acceptedPrivacy = document.getElementById('register-privacy').checked;
                const wantsNewsletter = document.getElementById('register-newsletter').checked;
                const feedback = document.getElementById('register-feedback');

                if (!email || !password) {
                    feedback.textContent = 'Completa email y contraseña.';
                    return;
                }
                if (password.length < 6) {
                    feedback.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                    return;
                }
                if (password !== confirm) {
                    feedback.textContent = 'Las contraseñas no coinciden.';
                    return;
                }
                if (!acceptedPrivacy) {
                    feedback.textContent = 'Debes aceptar la política de tratamiento de datos.';
                    return;
                }

                try {
                    state.guestMode = false;
                    sessionStorage.removeItem('guestMode');
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    const payload = {
                        email,
                        privacyAccepted: true,
                        newsletterOptIn: wantsNewsletter,
                        newsletterOptInUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        onboardingCompleted: false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await alumniCollection.doc(cred.user.uid).set(payload, { merge: true });
                    feedback.textContent = 'Cuenta creada correctamente.';
                    // onAuthStateChanged will redirect to directory/onboarding
                } catch (error) {
                    feedback.textContent = getFriendlyAuthError(error, 'No pudimos crear la cuenta.');
                }
            },
            registerWithGoogle: async () => {
                const feedback = document.getElementById('register-feedback');
                const provider = new firebase.auth.GoogleAuthProvider();
                const acceptedPrivacy = document.getElementById('register-privacy').checked;
                if (!acceptedPrivacy) {
                    feedback.textContent = 'Debes aceptar la política de tratamiento de datos.';
                    return;
                }
                try {
                    state.guestMode = false;
                    sessionStorage.removeItem('guestMode');
                    const result = await auth.signInWithPopup(provider);
                    await alumniCollection.doc(result.user.uid).set({
                        email: result.user.email || '',
                        privacyAccepted: true,
                        newsletterOptIn: true,
                        newsletterOptInUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        onboardingCompleted: false,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    feedback.textContent = 'Preferencias guardadas correctamente.';
                    // onAuthStateChanged will redirect
                } catch (error) {
                    feedback.textContent = getFriendlyAuthError(error, 'No pudimos registrarte con Google.');
                }
            }
        };
        window.authLogic = authLogic;

        auth.onAuthStateChanged((user) => {
            if (user) goto('directory');
        });
    </script>
</body>
</html>
