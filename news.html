<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinapsis | Novedades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d',950:'#052e16' },
                    stone: { 50:'#fafaf9',100:'#f5f5f4',200:'#e7e5e4',300:'#d6d3d1',400:'#a8a29e',500:'#78716c',600:'#57534e',700:'#44403c',800:'#292524',900:'#1c1917' },
                    sun: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',400:'#fbbf24',500:'#f59e0b',600:'#d97706' }
                },
                animation: { 'fade-in':'fadeIn 0.3s ease-out','slide-up':'slideUp 0.4s ease-out','slide-in-right':'slideInRight 0.4s cubic-bezier(0.16,1,0.3,1)' },
                keyframes: { fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},slideUp:{'0%':{transform:'translateY(20px)',opacity:'0'},'100%':{transform:'translateY(0)',opacity:'1'}},slideInRight:{'0%':{transform:'translateX(100%)'},'100%':{transform:'translateX(0)'}} }
            }}
        }
    </script>
    <style>
        body { background-color: #fafaf9; }
        .glass-nav { background: rgba(250,250,249,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(231,229,228,0.6); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .input-label { font-size:0.75rem; font-weight:700; color:#78716c; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; display:block; }
        .input-field { width:100%; padding:0.85rem 1rem; background:rgba(250,250,249,0.9); border:1px solid #e7e5e4; border-radius:0.75rem; outline:none; transition:all 0.2s ease; font-size:0.9rem; font-weight:500; color:#292524; }
        .input-field:focus { border-color:#16a34a; box-shadow:0 0 0 4px rgb(34 197 94/0.15); background:#fff; }
    </style>
</head>
<body class="text-stone-800 font-sans min-h-screen flex flex-col">

    <main class="flex-1 pt-20 pb-24 md:pb-8 px-4 bg-stone-50/60">
        <div class="max-w-5xl mx-auto animate-slide-up pb-10">
            <div class="mb-10 text-center md:text-left">
                <h2 class="text-3xl font-bold text-gray-900 mb-2">Novedades y Eventos</h2>
                <p class="text-gray-500">Mantente al día con lo que sucede en tu comunidad.</p>
            </div>

            <div id="news-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Feed renderizado via JS -->
            </div>
        </div>
    </main>

    <!-- MODAL DE NOTICIAS -->
    <div id="modal-news" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm bg-black/40">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden animate-fade-in relative">
            <button onclick="uiLogic.closeNewsModal()" class="absolute top-4 right-4 bg-white/50 hover:bg-white p-2 rounded-full backdrop-blur-md transition z-10" aria-label="Cerrar noticia"><i class="ph-bold ph-x text-xl"></i></button>
            <div class="h-64 relative shrink-0">
                <img id="news-modal-img" src="" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                <div class="absolute bottom-6 left-6 right-6 text-white">
                    <span id="news-modal-cat" class="px-3 py-1 bg-brand-600 rounded-lg text-xs font-bold uppercase tracking-wide mb-2 inline-block">Categoría</span>
                    <h2 id="news-modal-title" class="text-2xl md:text-3xl font-bold leading-tight">Título</h2>
                </div>
            </div>
            <div class="p-8 overflow-y-auto">
                <div class="flex items-center gap-4 text-sm text-gray-500 mb-6 border-b border-gray-100 pb-4">
                    <span class="flex items-center gap-1"><i class="ph-bold ph-calendar"></i> <span id="news-modal-date">Fecha</span></span>
                    <span class="flex items-center gap-1"><i class="ph-bold ph-user"></i> Admin</span>
                </div>
                <p id="news-modal-body" class="text-gray-600 leading-relaxed text-lg">Contenido...</p>
                <div class="mt-8 pt-6 border-t border-gray-100 flex justify-end">
                    <button onclick="uiLogic.closeNewsModal()" class="px-6 py-2.5 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="theme.js?v=5"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
    <script src="shared.js?v=6"></script>
    <script>
        renderNav('news');

        const newsLogic = {
            render: () => {
                const feed = document.getElementById('news-feed');
                if (!state.data.news.length) {
                    feed.innerHTML = '<div class="col-span-full bg-white rounded-2xl border border-gray-100 p-8 text-center text-sm text-gray-500">Aún no hay novedades publicadas.</div>';
                    return;
                }
                feed.innerHTML = state.data.news.map((item, idx) => `
                    <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden hover:shadow-lg transition cursor-pointer group" onclick="uiLogic.openNewsModal(${idx})">
                        <div class="h-48 overflow-hidden relative">
                            <img src="${sanitizeHTML(item.img)}" alt="${sanitizeHTML(item.title)}" class="w-full h-full object-cover transition duration-500 group-hover:scale-105">
                            <span class="absolute top-4 left-4 bg-white/90 backdrop-blur text-xs font-bold px-3 py-1 rounded-lg shadow-sm">${sanitizeHTML(item.category)}</span>
                        </div>
                        <div class="p-6">
                            <div class="text-xs font-bold text-brand-600 mb-2 uppercase">${sanitizeHTML(item.date)}</div>
                            <h3 class="font-bold text-lg text-gray-900 mb-3 leading-tight group-hover:text-brand-600 transition">${sanitizeHTML(item.title)}</h3>
                            <p class="text-base text-gray-500 leading-relaxed line-clamp-4 min-h-[6.5rem]">${sanitizeHTML(item.summary)}</p>
                            <button class="mt-4 text-sm font-bold text-gray-900 flex items-center gap-1 group-hover:gap-2 transition-all">Leer más <i class="ph-bold ph-arrow-right"></i></button>
                        </div>
                    </div>
                `).join('');
            }
        };

        const uiLogic = {
            openNewsModal: (idx) => {
                const item = state.data.news[idx];
                document.getElementById('news-modal-img').src = item.img;
                document.getElementById('news-modal-cat').innerText = item.category;
                document.getElementById('news-modal-title').innerText = item.title;
                document.getElementById('news-modal-date').innerText = item.date;
                document.getElementById('news-modal-body').innerText = item.summary || 'Sin contenido adicional.';
                document.getElementById('modal-news').classList.remove('hidden');
            },
            closeNewsModal: () => document.getElementById('modal-news').classList.add('hidden')
        };

        window.newsLogic = newsLogic;
        window.uiLogic = uiLogic;

        auth.onAuthStateChanged(async (user) => {
            if (!user && !state.guestMode) { goto('login'); return; }
            if (user) {
                const ready = await hydrateAuthenticatedUser(user, { redirectOnboarding: true });
                if (!ready) return;
            } else {
                refreshHeaderIdentity();
                updateAdminNavVisibility();
            }
            await loadNews();
            newsLogic.render();
        });
    </script>
</body>
</html>
